<!DOCTYPE html>
<html>
<head>
<title>Flashcard Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Flashcard Quiz App</h1>

<div class="card-container">

<div id="card">
<h2 id="question">No Flashcards Available</h2>
<p id="answer" class="hide"></p>
</div>

<button id="showAnswer">Show Answer</button>

<div class="nav">
<button id="prev">Previous</button>
<button id="next">Next</button>
</div>

</div>


<div class="form-container">

<h2>Add / Edit Flashcard</h2>

<input type="text" id="newQuestion" placeholder="Enter Question">

<input type="text" id="newAnswer" placeholder="Enter Answer">

<button id="addCard">Add Card</button>
<button id="updateCard">Update Card</button>
<button id="deleteCard">Delete Card</button>

</div>


<script src="script.js"></script>

</body>
</html>
